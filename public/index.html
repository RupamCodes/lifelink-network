<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLink — Blood Bank & Organ Donation Network</title>
    <meta name="description" content="LifeLink is a comprehensive blood bank and organ donation management network for hospitals, donors, and patients.">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-logo">
                <span class="logo-icon"><i data-feather="droplet"></i></span>
                <span class="logo-text">LifeLink</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active" data-view="dashboard">
                    <i data-feather="home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" data-view="donors">
                    <i data-feather="users"></i>
                    <span>Donors</span>
                </a>
                <a href="#" class="nav-link" data-view="blood">
                    <i data-feather="droplet"></i>
                    <span>Blood Inventory</span>
                </a>
                <a href="#" class="nav-link" data-view="organs">
                    <i data-feather="heart"></i>
                    <span>Organs</span>
                </a>
                <a href="#" class="nav-link" data-view="hospitals">
                    <i data-feather="activity"></i>
                    <span>Hospitals</span>
                </a>
                <a href="#" class="nav-link" data-view="patients">
                    <i data-feather="user"></i>
                    <span>Patients</span>
                </a>
                <hr style="margin: 8px 16px; border: 0; border-top: 1px solid var(--border);">
                <a href="#" class="nav-link" data-view="requests">
                    <i data-feather="clipboard"></i>
                    <span>Requests</span>
                </a>
                <a href="#" class="nav-link" data-view="matching">
                    <i data-feather="git-pull-request"></i>
                    <span>Matching Engine</span>
                </a>
                <a href="#" class="nav-link" data-view="allocations">
                    <i data-feather="package"></i>
                    <span>Allocations</span>
                </a>
                <a href="#" class="nav-link" data-view="alerts">
                    <i data-feather="bell"></i>
                    <span>Alerts</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-footer-text">
                    <span>v1.0</span>
                </div>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div id="main-wrapper" style="flex: 1; display: flex; flex-direction: column; margin-left: 220px; min-width: 0;">
            
            <!-- Topbar fixed at top of content area -->
            <header id="topbar" class="topbar">
                <div class="topbar-left">
                    <h1 id="page-title" style="font-size: 18px; margin: 0; font-family: var(--font-heading);">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <div class="topbar-search">
                        <i data-feather="search"></i>
                        <input type="text" placeholder="Search..." style="width: 200px;">
                    </div>
                    <div class="topbar-bell">
                        <i data-feather="bell"></i>
                        <span class="topbar-bell-badge" id="topbar-alert-badge" style="display:none;">0</span>
                    </div>
                    <div class="topbar-avatar" style="background: var(--accent-primary); color: white;">AD</div>
                </div>
            </header>

            <!-- Main Content -->
            <main id="content" style="margin-left: 0; padding-top: var(--space-xl);">
                <div id="view-container"></div>
            </main>
        </div>

        <!-- Mobile sidebar toggle -->
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
            <i data-feather="menu"></i>
        </button>
    </div>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/donors.js"></script>
    <script src="/js/blood.js"></script>
    <script src="/js/organs.js"></script>
    <script src="/js/hospitals.js"></script>
    <script src="/js/patients.js"></script>
    <script src="/js/requests.js"></script>
    <script src="/js/matching.js"></script>
    <script src="/js/allocations.js"></script>
    <script src="/js/alerts.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
